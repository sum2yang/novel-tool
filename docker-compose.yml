services:
  postgres:
    image: postgres:16-bookworm
    container_name: novel-tools-postgres
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}
      -c effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-512MB}
      -c maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}
      -c work_mem=${POSTGRES_WORK_MEM:-4MB}
      -c max_connections=${POSTGRES_MAX_CONNECTIONS:-40}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-novel_tools}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: novel-tools-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  app:
    image: ${APP_IMAGE:-noveltools-app:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novel-tools-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      NODE_ENV: production
      APP_ENV: production
      PORT: 3000
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=768}
      MALLOC_ARENA_MAX: ${MALLOC_ARENA_MAX:-2}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/novel_tools?schema=public}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-please-change-me-to-a-random-32-byte-secret}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-please-change-me-to-a-random-64-char-hex-key}
      LINUX_DO_CLIENT_ID: ${LINUX_DO_CLIENT_ID:-}
      LINUX_DO_CLIENT_SECRET: ${LINUX_DO_CLIENT_SECRET:-}
      PRISMA_DB_SYNC_MODE: ${PRISMA_DB_SYNC_MODE:-deploy}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-novel-tools}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin123}
      GROK_API_URL: ${GROK_API_URL:-}
      GROK_API_KEY: ${GROK_API_KEY:-}
      GROK_MODEL: ${GROK_MODEL:-}
      TAVILY_API_URL: ${TAVILY_API_URL:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      FIRECRAWL_API_URL: ${FIRECRAWL_API_URL:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      GROK_RETRY_MAX_ATTEMPTS: ${GROK_RETRY_MAX_ATTEMPTS:-2}
      GROK_RETRY_MULTIPLIER: ${GROK_RETRY_MULTIPLIER:-2}
      GROK_RETRY_MAX_WAIT: ${GROK_RETRY_MAX_WAIT:-30000}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  postgres_data:
  minio_data:
